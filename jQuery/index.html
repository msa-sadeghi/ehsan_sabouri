<body>
    <<div class="container">
        <h2>بخش اول</h2>

        <p>پاراگراف 2 (فرزند مستقیم)</p>
        <div class="inner">
            <p>پاراگراف 3 (فرزند غیرمستقیم - نوه)</p>
        </div>
    </div>

        <h2>بخش دوم</h2>

        <span>متن span</span>
        <p>پاراگراف دیگر</p>
    </div>

    <button id="directChild">فرزندان مستقیم div</button>
    <button id="allDesc">تمام فرزندان div</button>
    <button id="adjacent">پاراگراف بعد از h2</button>
    <button id="siblings">تمام پاراگراف‌های بعد h2</button>


    <script src="app.js"></script>
