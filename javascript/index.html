<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اپلیکیشن آب‌وهوا</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ اپلیکیشن آب‌وهوا</h1>
            <p>وضعیت آب و هوای شهر خود را بررسی کنید</p>
        </div>
        
        <div class="search-box">
            <div class="search-input">
                <input type="text" id="cityInput" placeholder="نام شهر را وارد کنید...">
                <button onclick="searchWeather()">🔍 جستجو</button>
            </div>
            
            <div class="quick-cities">
                <button class="city-btn" onclick="getWeather('Tehran')">تهران</button>
                <button class="city-btn" onclick="getWeather('Shiraz')">شیراز</button>
                <button class="city-btn" onclick="getWeather('Isfahan')">اصفهان</button>
                <button class="city-btn" onclick="getWeather('Mashhad')">مشهد</button>
                <button class="city-btn" onclick="getWeather('Tabriz')">تبریز</button>
            </div>
        </div>
        
        <div id="weatherContainer"></div>
    </div>

   <script src="app.js"></script>
        
</body>
</html>
